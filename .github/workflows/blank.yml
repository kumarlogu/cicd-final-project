name: CI CD GitHub Validate

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install dependencies
      run: npm install

    - name: Run Build
      run: npm run build --if-present

    - name: Run Tests
      run: npm test --if-present

    - name: Validation Complete
      run: echo "CI/CD Pipeline Successful"
